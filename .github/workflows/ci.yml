name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          ENVIRONMENT: test
          LOG_LEVEL: INFO
          AUTH_SECRET: test-secret-value-that-is-long-enough-123
          AUTH_URL: http://localhost:3000
          AUTH_ENABLED: "false"
          DATABASE_URL: sqlite+pysqlite:///:memory:
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          LLM_PROVIDER: openai
          OPENAI_API_KEY: test-openai-key-1234567890
          OPENAI_MODEL: gpt-4o-mini
          API_RATE_LIMIT_PER_MINUTE: "5000"
        run: python -m pytest tests -q

  web-tests:
    name: Web tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: pnpm test --run

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_BASE_URL: /api/v1
        run: pnpm build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    strategy:
      matrix:
        include:
          - name: api
            file: api/Dockerfile
            tag: creatoros-api
          - name: web
            file: web/Dockerfile
            tag: creatoros-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.tag }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
