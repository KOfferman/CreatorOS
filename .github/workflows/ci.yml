name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Loaded from GitHub repository secrets/variables (sync via scripts/sync-github-env.sh).
# Mirrors api/.env.local + web/.env.local — never hardcode values here.
env:
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  LOG_LEVEL: ${{ vars.LOG_LEVEL }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  AUTH_URL: ${{ vars.AUTH_URL }}
  AUTH_ENABLED: ${{ vars.AUTH_ENABLED }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_HOST: ${{ vars.REDIS_HOST }}
  REDIS_PORT: ${{ vars.REDIS_PORT }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
  CELERY_RESULT_BACKEND: ${{ secrets.CELERY_RESULT_BACKEND }}
  LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
  OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
  OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
  API_PORT: ${{ vars.API_PORT }}
  WEB_PORT: ${{ vars.WEB_PORT }}
  GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  GOOGLE_AUTH_REDIRECT_URI: ${{ vars.GOOGLE_AUTH_REDIRECT_URI }}
  META_CLIENT_ID: ${{ vars.META_CLIENT_ID }}
  META_CLIENT_SECRET: ${{ secrets.META_CLIENT_SECRET }}
  META_REDIRECT_URI: ${{ vars.META_REDIRECT_URI }}
  INSTAGRAM_CONFIG_ID: ${{ vars.INSTAGRAM_CONFIG_ID }}
  INSTAGRAM_CONFIG_SECRET: ${{ secrets.INSTAGRAM_CONFIG_SECRET }}
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
  NEXT_PUBLIC_CREATOR_USER_ID: ${{ vars.NEXT_PUBLIC_CREATOR_USER_ID }}

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub secrets/variables
        run: bash ../scripts/check-github-env.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          # Isolated unit tests — override DB/auth only for pytest (same pattern as conftest).
          export ENVIRONMENT=test
          export AUTH_ENABLED=false
          export DATABASE_URL="sqlite+pysqlite:///:memory:"
          python -m pytest tests -q

  web-tests:
    name: Web tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub secrets/variables
        run: bash ../scripts/check-github-env.sh

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: pnpm test

      - name: Build Next.js
        run: pnpm build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api-tests, web-tests]
    strategy:
      matrix:
        include:
          - name: api
            file: api/Dockerfile
            tag: creatoros-api
          - name: web
            file: web/Dockerfile
            tag: creatoros-web
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner for GHCR
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Validate GitHub secrets/variables
        run: bash scripts/check-github-env.sh

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          tags: ghcr.io/${{ steps.ghcr.outputs.owner }}/${{ matrix.tag }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vercel:
    name: Deploy to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api-tests, web-tests]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Vercel deploy secrets
        run: |
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID — run scripts/sync-github-env.sh" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID" && exit 1)
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN" && exit 1)

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Smoke test API health
        run: curl -fsS "${{ steps.deploy.outputs.url }}/api/v1/health"
